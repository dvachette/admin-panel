name: Deploy admin panel

on:
  push:
    branches:
      - master

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: contains(toJson(github.event.commits), 'backend/')
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/debian/admin-panel/backend
            git pull
            npm install
            npm run build
            sudo systemctl restart admin-backend

  deploy-frontend:
    runs-on: ubuntu-latest
    if: contains(toJson(github.event.commits), 'frontend/')
    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/debian/admin-panel/frontend
            git pull
            docker compose up -d --build